<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LLM top box -->
  <rect x="140" y="20" width="400" height="64" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">LLM (Claude / any model)</text>
  <text x="340" y="64" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">+ CLAUDE.md methodology v2</text>

  <!-- MCP arrows -->
  <line x1="240" y1="84" x2="180" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="108" text-anchor="middle" font-size="12" fill="#5F5E5A">MCP (stdio)</text>

  <line x1="440" y1="84" x2="500" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="108" text-anchor="middle" font-size="12" fill="#5F5E5A">MCP (SSH)</text>

  <!-- Static analysis container -->
  <rect x="40" y="140" width="260" height="350" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="170" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Static analysis</text>
  <text x="170" y="186" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Windows</text>

  <!-- GhidraMCP -->
  <rect x="60" y="206" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="170" y="226" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">GhidraMCP (open source)</text>
  <text x="170" y="244" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">163 tools + extensions</text>

  <!-- Static capabilities -->
  <rect x="60" y="278" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="170" y="300" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">Cross-reference tracking</text>

  <rect x="60" y="334" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="170" y="356" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">Batch memory read</text>

  <rect x="60" y="390" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="170" y="412" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">String / global search</text>

  <!-- Dynamic analysis container -->
  <rect x="380" y="140" width="260" height="350" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="510" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Dynamic analysis</text>
  <text x="510" y="186" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Kali VM (isolated)</text>

  <!-- MCP Server -->
  <rect x="400" y="206" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="510" y="226" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">dynamic_mcp_server</text>
  <text x="510" y="244" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">asyncio + thread pool</text>

  <!-- Dynamic tools -->
  <rect x="400" y="278" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="510" y="300" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">run_dynamic_trace</text>

  <rect x="400" y="334" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="510" y="356" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">gdb_breakpoint_read</text>

  <rect x="400" y="390" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="510" y="412" text-anchor="middle" dominant-baseline="central" font-size="14" fill="#444441">disassemble_bytes</text>

  <!-- Bottom label -->
  <line x1="300" y1="470" x2="380" y2="470" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="340" y="500" text-anchor="middle" font-size="12" fill="#5F5E5A">Static ↔ dynamic closed-loop reasoning</text>
</svg>
